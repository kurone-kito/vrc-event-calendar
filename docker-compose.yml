services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vrc_event_calendar}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    # cspell:ignore isready
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-vrc_event_calendar}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/vrc_event_calendar?schema=public}
      NEXT_TELEMETRY_DISABLED: "1"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const http=require('http');const req=http.get('http://127.0.0.1:3000',res=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    ports:
      - "${APP_PORT:-3000}:3000"

volumes:
  postgres-data:
